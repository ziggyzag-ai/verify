<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancientech Academy — Credential Verification</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg-0:#0a0d08;
    --bg-1:#12160f;
    --accent:#8fd130;
    --accent-dim:#4b6b1e;
    --ink:#f4f6ef;
    --ink-dim:#b9c0ac;
    --line:#3a4530;
    --red:#e6584f;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, rgba(143,209,48,0.10), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 56px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 56px),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-0) 55%, #060704 100%);
    font-family:'Poppins',sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:60px 20px 40px;
  }

  .brand{display:flex; align-items:center; gap:12px; margin-bottom:8px;}
  .brand svg{width:34px; height:34px;}
  .brand .name{font-size:19px; font-weight:800; letter-spacing:1.5px;}
  .brand .sub{font-size:10px; letter-spacing:2.5px; color:var(--ink-dim); font-weight:600;}

  .headline{
    text-align:center;
    font-size:32px;
    font-weight:800;
    margin-top:28px;
    letter-spacing:0.5px;
  }
  .sub-headline{
    text-align:center;
    color:var(--ink-dim);
    font-size:14px;
    margin-top:8px;
    max-width:480px;
    line-height:1.5;
  }

  .search-wrap{
    width:100%;
    max-width:520px;
    margin-top:34px;
    display:flex;
    gap:10px;
  }
  #certInput{
    flex:1;
    padding:15px 18px;
    background:#0d1109;
    border:1.5px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    letter-spacing:1px;
    outline:none;
    transition:border-color .15s ease;
  }
  #certInput:focus{border-color:var(--accent);}
  #certInput::placeholder{color:#5a6350;}

  #searchBtn{
    padding:15px 26px;
    background:var(--accent);
    color:#0a0d08;
    border:none;
    border-radius:8px;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:filter .15s ease;
  }
  #searchBtn:hover{filter:brightness(1.08);}

  .hint{
    margin-top:12px;
    font-size:12px;
    color:var(--ink-dim);
  }
  .hint button{
    background:none; border:none; color:var(--accent);
    font-size:12px; cursor:pointer; text-decoration:underline;
    font-family:inherit; padding:0;
  }

  .result{
    width:100%;
    max-width:600px;
    margin-top:34px;
    display:none;
  }

  .card{
    background:linear-gradient(160deg, #12160f 0%, #0a0d08 100%);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:32px 34px;
    position:relative;
    overflow:hidden;
  }
  .card.valid{border-color:var(--accent-dim);}
  .card.invalid{border-color:#5a2a26;}

  .status-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:22px;
  }
  .status-dot{width:10px; height:10px; border-radius:50%;}
  .status-dot.valid{background:var(--accent); box-shadow:0 0 12px rgba(143,209,48,0.7);}
  .status-dot.invalid{background:var(--red); box-shadow:0 0 12px rgba(230,88,79,0.6);}
  .status-text{font-weight:700; font-size:15px; letter-spacing:0.5px;}
  .status-text.valid{color:var(--accent);}
  .status-text.invalid{color:var(--red);}

  .name-line{font-family:'Caveat',cursive; font-size:40px; font-weight:700; margin-bottom:4px;}

  .field-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 24px;
    margin-top:22px;
    padding-top:22px;
    border-top:1px solid var(--line);
  }
  .field .label{font-size:10px; letter-spacing:1.5px; color:var(--ink-dim); font-weight:600; margin-bottom:4px;}
  .field .value{font-size:14px; font-weight:600; color:var(--ink);}
  .field .value.mono{font-family:'JetBrains Mono', monospace; color:var(--accent); letter-spacing:0.5px;}

  .not-found{
    text-align:center;
    padding:12px 0 4px;
  }
  .not-found .big{font-size:20px; font-weight:700; color:var(--red); margin-bottom:8px;}
  .not-found .small{font-size:13px; color:var(--ink-dim); line-height:1.6;}

  footer{
    margin-top:auto;
    padding-top:60px;
    font-size:11px;
    color:#5a6350;
    text-align:center;
  }
</style>
</head>

      <div class="name">ANCIENTECH</div>
      <div class="sub">CYBERSECURITY ACADEMY</div>
    </div>
  </div>

  <div class="headline">Credential Verification</div>
  <div class="sub-headline">Enter a Credential ID to confirm a certificate was issued by Ancientech Cybersecurity Academy.</div>

  <div class="search-wrap">
    <input id="certInput" type="text" placeholder="e.g. ANC-EH-2024-0004" autocomplete="off">
    <button id="searchBtn">Verify</button>
  </div>
  <div class="hint">Try it with Peter's certificate: <button id="fillDemo">ANC-EH-2024-0004</button></div>

  <div class="result" id="result"></div>

  <footer>Ancientech Cybersecurity Academy · Build. Defend. Decentralize.</footer>

<script>
  // ---- Credential records ----
  // Add one entry here per certificate issued. This is the "database" for now —
  // swap for a Google Sheet fetch or real backend once volume grows.
  const RECORDS = {
    "ANC-EH-2024-0004": {
      name: "Peter Odion Oriasotie",
      course: "Cybersecurity Defense Course — Ethical Hacker",
      track: "Cybersecurity & Ethical Hacking",
      cohort: "Batch 2",
      issued: "July 1, 2026",
      validity: "Valid until July 1, 2030 (4-year cycle)",
      status: "valid"
    }
  };

  const input = document.getElementById('certInput');
  const btn = document.getElementById('searchBtn');
  const result = document.getElementById('result');
  const fillDemo = document.getElementById('fillDemo');

  function renderValid(id, r){
    result.innerHTML = `
      <div class="card valid">
        <div class="status-row">
          <div class="status-dot valid"></div>
          <div class="status-text valid">VALID CREDENTIAL</div>
        </div>
        <div class="name-line">${r.name}</div>
        <div style="color:var(--ink-dim); font-size:14px;">${r.course}</div>
        <div class="field-grid">
          <div class="field"><div class="label">CREDENTIAL ID</div><div class="value mono">${id}</div></div>
          <div class="field"><div class="label">TRACK</div><div class="value">${r.track}</div></div>
          <div class="field"><div class="label">BATCH</div><div class="value">${r.cohort}</div></div>
          <div class="field"><div class="label">DATE ISSUED</div><div class="value">${r.issued}</div></div>
          <div class="field"><div class="label">VALIDITY</div><div class="value">${r.validity}</div></div>
          <div class="field"><div class="label">STATUS</div><div class="value" style="color:var(--accent);">Active</div></div>
        </div>
      </div>`;
    result.style.display = 'block';
  }

  function renderInvalid(id){
    result.innerHTML = `
      <div class="card invalid">
        <div class="status-row">
          <div class="status-dot invalid"></div>
          <div class="status-text invalid">NOT FOUND</div>
        </div>
        <div class="not-found">
          <div class="big">No credential matches "${id}"</div>
          <div class="small">Double-check the ID printed on the certificate.<br>If you believe this is an error, contact Ancientech Academy directly.</div>
        </div>
      </div>`;
    result.style.display = 'block';
  }

  function doSearch(){
    const raw = input.value.trim().toUpperCase();
    if(!raw) return;
    if(RECORDS[raw]){
      renderValid(raw, RECORDS[raw]);
    } else {
      renderInvalid(raw);
    }
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });
  fillDemo.addEventListener('click', () => { input.value = 'ANC-EH-2024-0004'; doSearch(); });

  // Auto-check ?id= param so the QR code can deep-link straight to a result
  const params = new URLSearchParams(window.location.search);
  if(params.get('id')){
    input.value = params.get('id');
    doSearch();
  }
</script>
